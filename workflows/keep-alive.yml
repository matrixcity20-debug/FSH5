name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          curl -fsS "https://fsh5.onrender.com/api/healthz" \
            -H "User-Agent: Mozilla/5.0" \
            --max-time 30 \
            && echo "OK" || echo "Site unreachable"
